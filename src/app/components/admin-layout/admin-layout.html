<div class="admin-layout">
  <!-- Clean Modern Sidebar -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed" [class.mobile-open]="mobileMenuOpen">
    <!-- Logo Section -->
    <div class="logo-container">
      <div class="logo-img">
        <img src="assets/images/icons/logo-main.png" class="big-logo" alt="logo" />
        <img src="assets/images/icons/logo-small.png" class="small-logo" alt="logo" />
      </div>
    </div>
    <!-- Navigation Menu -->
    <nav class="nav-menu">
      <div class="platform-label">Platform</div>

      <!-- Dashboard -->
      <div class="menu-item" *ngIf="isVisible('/admin/dashboard')">
        <a routerLink="/admin/dashboard" routerLinkActive="active" class="menu-link">
          <img src="assets/images/icons/ouline-globe.png" alt="Dashboard Icon" class="menu-icon" />
          <span>Dashboard</span>
        </a>
      </div>

      <!-- Master -->
      <div class="menu-item" *ngIf="hasAnyVisible(['/admin/members', '/admin/chit-groups', '/admin/enrollments'])">
        <button class="menu-link" [class.expanded]="masterMenuExpanded" (click)="toggleMasterMenu()">
          <img src="assets/images/icons/ouline-globe.png" alt="Master Icon" class="menu-icon" />
          <span>Master</span>
          <img src="assets/images/icons/up.png" alt="Expand" class="expand-icon" [class.rotated]="masterMenuExpanded" />
        </button>

        <div class="submenu" *ngIf="masterMenuExpanded">
          <div class="submenu-item" *ngIf="hasAnyVisible(['/admin/members', '/admin/chit-groups', '/admin/enrollments'])">
            <button class="submenu-link" [class.expanded]="accountsSubmenuExpanded" (click)="toggleAccountsSubmenu()">
              <span>Members</span>
              <img src="assets/images/icons/up.png" alt="Expand" class="expand-icon" [class.rotated]="accountsSubmenuExpanded" />
            </button>
            <div class="nested-submenu" *ngIf="accountsSubmenuExpanded">
              <a *ngIf="isVisible('/admin/members')" routerLink="/admin/members" routerLinkActive="active" class="nested-submenu-link">
                <span>Member Registration</span>
              </a>
              <a *ngIf="isVisible('/admin/chit-groups')" routerLink="/admin/chit-groups" routerLinkActive="active" class="nested-submenu-link">
                <span>Chit Group</span>
              </a>
              <a *ngIf="isVisible('/admin/enrollments')" routerLink="/admin/enrollments" routerLinkActive="active" class="nested-submenu-link">
                <span>Enrollments</span>
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Transactions -->
      <div class="menu-item" *ngIf="hasAnyVisible(['/admin/auctions', '/admin/member-receipts', '/admin/check-management', '/admin/receipts', '/admin/bid-payments'])">
        <button class="menu-link" [class.expanded]="transactionsMenuExpanded" (click)="toggleTransactionsMenu()">
          <img src="assets/images/icons/ouline-globe.png" alt="Transactions Icon" class="menu-icon" />
          <span>Transactions</span>
          <img src="assets/images/icons/up.png" alt="Expand" class="expand-icon" [class.rotated]="transactionsMenuExpanded" />
        </button>

        <div class="submenu" *ngIf="transactionsMenuExpanded">
          <div class="submenu-item" *ngIf="hasAnyVisible(['/admin/auctions', '/admin/member-receipts', '/admin/check-management', '/admin/receipts'])">
            <button class="submenu-link" [class.expanded]="accountsSubmenuExpanded" (click)="toggleAccountsSubmenu()">
              <span>Members</span>
              <img src="assets/images/icons/up.png" alt="Expand" class="expand-icon" [class.rotated]="accountsSubmenuExpanded" />
            </button>
            <div class="nested-submenu" *ngIf="accountsSubmenuExpanded">
              <a *ngIf="isVisible('/admin/auctions')" routerLink="/admin/auctions" routerLinkActive="active" class="nested-submenu-link">
                <span>Auctions</span>
              </a>
              <a *ngIf="isVisible('/admin/check-management')" routerLink="/admin/check-management" routerLinkActive="active" class="nested-submenu-link">
                <span>Cheque Management</span>
              </a>
              <a *ngIf="isVisible('/admin/receipts')" routerLink="/admin/receipts" routerLinkActive="active" class="nested-submenu-link">
                <span>Receipts</span>
              </a>
            </div>
          </div>

          <div class="submenu-item" *ngIf="hasAnyVisible(['/admin/bid-payments'])">
            <button class="submenu-link" [class.expanded]="paymentsSubmenuExpanded" (click)="togglePaymentsSubmenu()">
              <span>Payments</span>
              <img src="assets/images/icons/up.png" alt="Expand" class="expand-icon" [class.rotated]="paymentsSubmenuExpanded" />
            </button>
            <div class="nested-submenu" *ngIf="paymentsSubmenuExpanded">
              <a *ngIf="isVisible('/admin/bid-payments')" routerLink="/admin/bid-payments" routerLinkActive="active" class="nested-submenu-link">
                <span>Bid Payments</span>
              </a>
              <a routerLink="/admin/surety-entry" routerLinkActive="active" class="nested-submenu-link">
                <span>Surety Entry</span>
              </a>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Sidebar Footer -->
    <div class="sidebar-footer">
      <div class="footer-menu footer-settings">
        <button class="menu-link" [class.expanded]="footerSettingsExpanded" (click)="toggleFooterSettings()">
          <img src="assets/images/icons/ouline-globe.png" alt="Settings Icon" class="menu-icon" />
          <span>Settings</span>
          <img src="assets/images/icons/up.png" alt="Arrow" class="footer-arrow-icon" />
        </button>

        <div class="footer-settings-submenu" *ngIf="footerSettingsExpanded">
          <a *ngIf="isVisible('/admin/profile')" routerLink="/admin/profile" routerLinkActive="active" class="footer-submenu-link">Profile</a>
          <a *ngIf="isVisible('/admin/preferences')" routerLink="/admin/preferences" routerLinkActive="active" class="footer-submenu-link">Preferences</a>
          <button class="footer-submenu-link" (click)="logout()">Logout</button>
        </div>
      </div>

      <div class="footer-menu">
        <a href="#" class="menu-link">
          <img src="assets/images/icons/ouline-globe.png" alt="Help Icon" class="menu-icon" />
          <span>Help & Support</span>
        </a>
      </div>

      <!-- User Info Card -->
      <div class="user-info-card">
        <div class="user-avatar-large">
          <img src="https://i.pravatar.cc/150?img=4" alt="User Avatar" />
        </div>
        <div class="user-details">
          <div class="user-name">Tahsan</div>
          <div class="user-title">Sr Analytics Manager</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content Wrapper -->
  <div class="main-wrapper">
    <!-- Clean Header -->
    <header class="header">
      <!-- Left side -->
      <div class="header-left">
        <button class="menu-toggle" (click)="toggleSidebar()">
          <img src="assets/images/icons/Frame.png" alt="Menu" />
        </button>
        <div class="greeting">
          <img src="assets/images/icons/sun.png" alt="Good Morning" class="greeting-icon" />
          <span>Good morning, Tahsan!</span>
        </div>
      </div>

      <!-- Center: Search -->
      <div class="header-center">
        <div class="search-container">
          <div class="search-box">
            <img src="assets/images/icons/Search.png" alt="Search" class="search-icon" />
            <input type="text" placeholder="Search anything..." [(ngModel)]="searchQuery" (input)="onSearch()"
              (focus)="onSearch()" (blur)="hideSearch()" />
            <div class="shortcut">Ctrl K</div>
          </div>
          <!-- Search Results Dropdown -->
          <div class="search-results-dropdown" *ngIf="searchQuery.length > 2">
            <div class="no-results" *ngIf="searchResults.length === 0">
              No matches for "{{ searchQuery }}"
            </div>
            <a *ngFor="let result of searchResults" [routerLink]="result.link" class="search-item"
              (click)="searchQuery = ''; searchResults = []">
              <div class="result-title">{{ result.title }}</div>
              <div class="result-type">{{ result.type }}</div>
            </a>
          </div>
        </div>
      </div>

      <!-- Right side -->
      <div class="header-right">
        <!-- Financial Year Badge -->
        <div class="financial-year-badge">
          <span class="fy-label">FY</span>
          <span class="fy-value">2025-26</span>
        </div>

        <button class="btn-icon">
          <img src="assets/images/icons/notification.png" alt="Notifications" />
          <span class="badge">3</span>
        </button>
        <div class="user-menu">
          <div class="user-avatar">
            <img src="assets/images/icons/chitcloud-1.png" alt="User Avatar" />
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Mobile Overlay -->
  <div class="mobile-overlay" [class.active]="mobileMenuOpen" (click)="toggleMobileMenu()"></div>
</div>
